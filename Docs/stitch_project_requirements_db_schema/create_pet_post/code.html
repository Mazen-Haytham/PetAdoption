<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6a79e0",
                        "secondary": "#2a2f63",
                        "background-light": "#f7f5ff",
                        "background-dark": "#0e0f1d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .form-input-focus {
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(106, 121, 224, 0.2) !important;
            border-color: #6a79e0 !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar Component -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 lg:px-40 py-4">
<div class="max-w-[960px] mx-auto flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">pets</span>
</div>
<div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">List a Pet</h2>
<p class="text-xs text-primary font-semibold">Shelter Portal</p>
</div>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors px-3 py-2">
                        Cancel
                    </button>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-xl h-10 px-6 bg-primary text-white text-sm font-bold shadow-lg shadow-primary/20 hover:brightness-110 transition-all">
                        Publish
                    </button>
</div>
</div>
</header>
<main class="flex-1 px-4 lg:px-40 py-8">
<div class="max-w-[960px] mx-auto">
<!-- Progress Indicator -->
<div class="mb-8 flex flex-col gap-3">
<div class="flex justify-between items-end">
<span class="text-primary text-sm font-bold uppercase tracking-wider">Step 2 of 3</span>
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Pet Information &amp; Health</span>
</div>
<div class="h-2 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 66%;"></div>
</div>
</div>
<form class="grid grid-cols-1 md:grid-cols-12 gap-8">
<!-- Left Column: Media & Visuals -->
<div class="md:col-span-5 flex flex-col gap-6">
<section class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-secondary dark:text-slate-100">
<span class="material-symbols-outlined text-primary">image</span>
                                Photos
                            </h3>
<div class="relative aspect-square w-full rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 flex flex-col items-center justify-center cursor-pointer hover:bg-primary/10 transition-colors group">
<span class="material-symbols-outlined text-4xl text-primary mb-2 group-hover:scale-110 transition-transform">cloud_upload</span>
<p class="text-sm font-semibold text-slate-700 dark:text-slate-300">Upload high-quality images</p>
<p class="text-xs text-slate-500 mt-1">PNG, JPG up to 10MB</p>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<div class="grid grid-cols-3 gap-2 mt-4">
<div class="aspect-square bg-slate-50 dark:bg-slate-800 rounded-lg border border-primary/5 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">add</span>
</div>
<div class="aspect-square bg-slate-50 dark:bg-slate-800 rounded-lg border border-primary/5 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">add</span>
</div>
<div class="aspect-square bg-slate-50 dark:bg-slate-800 rounded-lg border border-primary/5 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">add</span>
</div>
</div>
</section>
<section class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-secondary dark:text-slate-100">
<span class="material-symbols-outlined text-primary">location_on</span>
                                Location
                            </h3>
<div class="mb-4">
<label class="text-xs font-bold text-slate-500 uppercase tracking-tight block mb-1">City or Shelter Address</label>
<input class="w-full h-12 rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 px-4 text-sm" placeholder="Search location..." type="text" value="Austin, Texas"/>
</div>
<div class="w-full h-40 rounded-xl overflow-hidden grayscale opacity-70 border border-primary/10">
<img class="w-full h-full object-cover" data-alt="Simplified map showing city streets" data-location="Austin, Texas" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJek391MzRBiMQBaOCcDBqyUhpSXKLGmFg3V2mATYJ2xmrZ6SQT5g98DEs40wnnCqlU6Q1EWL6pAASySB526sr2f20j-Kv8mp-0BKydMvVZtnclPzEr4g3Y7ds2x4IjhL4wTS4SJvAVc6K9FQ78oQHdUCJG9fp7GTZfR8J81NlfllG_LRLpozl_wor1Xl4UgkZRPSHkooJ72-HcI6Z64GD6VmYdhZZABOs1yoGdr11TyRPKdV5BgIXbecu0_bpwmXIig0babvt14vh"/>
</div>
</section>
</div>
<!-- Right Column: Details Form -->
<div class="md:col-span-7 flex flex-col gap-6">
<section class="bg-white dark:bg-slate-900/50 p-8 rounded-xl border border-primary/10 shadow-sm">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary">description</span>
<h3 class="text-lg font-bold text-secondary dark:text-slate-100">Basic Information</h3>
</div>
<div class="space-y-5">
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Pet Name</label>
<input class="w-full h-12 rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 px-4" placeholder="e.g. Buddy" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Animal Type</label>
<select class="w-full h-12 rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 px-4 text-sm">
<option>Dog</option>
<option>Cat</option>
<option>Rabbit</option>
<option>Bird</option>
</select>
</div>
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Breed</label>
<input class="w-full h-12 rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 px-4 text-sm" placeholder="e.g. Golden Retriever" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Age</label>
<div class="flex gap-2">
<input class="w-full h-12 rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 px-4 text-sm" placeholder="2" type="number"/>
<select class="w-24 h-12 rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 px-2 text-xs">
<option>Years</option>
<option>Months</option>
</select>
</div>
</div>
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Gender</label>
<div class="flex p-1 bg-background-light/50 dark:bg-background-dark rounded-lg border border-primary/10">
<button class="flex-1 py-2 text-xs font-bold rounded-md bg-white dark:bg-slate-800 shadow-sm text-primary" type="button">Male</button>
<button class="flex-1 py-2 text-xs font-bold rounded-md text-slate-500 hover:text-primary transition-colors" type="button">Female</button>
</div>
</div>
</div>
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Health Status</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary bg-primary/10 text-primary text-xs font-bold" type="button">Vaccinated</button>
<button class="px-4 py-2 rounded-full border border-primary/20 text-slate-500 text-xs font-bold hover:border-primary/50 transition-all" type="button">Neutered</button>
<button class="px-4 py-2 rounded-full border border-primary/20 text-slate-500 text-xs font-bold hover:border-primary/50 transition-all" type="button">Microchipped</button>
<button class="px-4 py-2 rounded-full border border-primary/20 text-slate-500 text-xs font-bold hover:border-primary/50 transition-all" type="button">Special Needs</button>
</div>
</div>
<div>
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 block mb-2">Story &amp; Description</label>
<textarea class="w-full rounded-lg border border-primary/20 bg-background-light/50 dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary/20 p-4 text-sm resize-none" placeholder="Tell potential owners about Buddy's personality, habits, and background..." rows="5"></textarea>
</div>
</div>
</section>
<div class="flex items-center justify-between p-4 bg-primary/5 rounded-xl border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">visibility</span>
</div>
<div>
<p class="text-sm font-bold text-secondary dark:text-slate-100">Preview Listing</p>
<p class="text-xs text-slate-500">See how it looks for adopters</p>
</div>
</div>
<span class="material-symbols-outlined text-primary">chevron_right</span>
</div>
</div>
</form>
<!-- Footer Navigation -->
<div class="mt-12 flex justify-between border-t border-primary/10 pt-8">
<button class="flex items-center gap-2 px-6 py-3 rounded-xl border border-primary/20 text-slate-600 dark:text-slate-400 font-bold hover:bg-white dark:hover:bg-slate-900 transition-all">
<span class="material-symbols-outlined">arrow_back</span>
                        Back
                    </button>
<button class="flex items-center gap-2 px-8 py-3 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Next Step
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
</div>
</body></html>
